{% extends "layout.html" %}

{% block content %} 
<h2>Login Form</h2>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    {% if form.errors %}
        <div class="alert alert-danger">
            Invalid username or password
        </div>
    {% endif %}

    <button class="btn btn-primary">Login</button>
</form>

<p>Don't have an account? 
<a href="{% url 'register' %}">Register here</a></p>

{% endblock %}
